spring:
  application:
    name: personalized-travel-system
  datasource:
    url: ${SQLITE_URL:jdbc:sqlite:D:/codex-deps/zhzjzz.github.io/data/tourism_system.gpkg}
    driver-class-name: org.sqlite.JDBC
    hikari:
      jdbc-url: ${SQLITE_URL:jdbc:sqlite:D:/codex-deps/zhzjzz.github.io/data/tourism_system.gpkg}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-sqlite.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

server:
  port: ${SERVER_PORT:8080}

llm:
  base-url: ${LLM_BASE_URL:${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}}
  api-key: ${LLM_API_KEY:${SILICONFLOW_API_KEY:}}
  model: ${LLM_MODEL:${SILICONFLOW_MODEL:}}
  temperature: ${LLM_TEMPERATURE:0.4}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:90}

aigc:
  image:
    api-url: ${AIGC_IMAGE_API_URL:}
    api-key: ${AIGC_IMAGE_API_KEY:}
    model: ${AIGC_IMAGE_MODEL:}
