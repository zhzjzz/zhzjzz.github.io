spring:
  application:
    name: personalized-travel-system
  datasource:
    url: ${SQLITE_URL:jdbc:sqlite:data-structure-design-backend/data/tourism_system.gpkg}
    driver-class-name: org.sqlite.JDBC
    hikari:
      jdbc-url: ${SQLITE_URL:jdbc:sqlite:data-structure-design-backend/data/tourism_system.gpkg}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-sqlite.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

server:
  port: ${SERVER_PORT:8080}
