# Docker Compose — 一键启动本地 MySQL
#
# 使用方法:
#   启动:  docker compose -f docker-compose-dev.yml up -d
#   停止:  docker compose -f docker-compose-dev.yml down

services:
  mysql:
    image: mysql:8.0
    container_name: travel-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: travel_system
      MYSQL_USER: travel_user
      MYSQL_PASSWORD: travel_pass
    volumes:
      - travel-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  travel-mysql-data:
