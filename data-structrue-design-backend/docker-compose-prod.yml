# =============================================================
# 生产环境部署 — Docker Compose
#
# 启动:  docker compose -f docker-compose-prod.yml up -d
# 停止:  docker compose -f docker-compose-prod.yml down
# 查看:  docker compose -f docker-compose-prod.yml ps
# 日志:  docker compose -f docker-compose-prod.yml logs -f app
# =============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: travel-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Travel@2026}
      MYSQL_DATABASE: travel_system
    volumes:
      - mysql-data:/var/lib/mysql
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=50
      --innodb-buffer-pool-size=64M
    deploy:
      resources:
        limits:
          memory: 300M

  app:
    image: travel-system:latest
    container_name: travel-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_URL=jdbc:mysql://mysql:3306/travel_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-Travel@2026}
      - SERVER_PORT=8080
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400M

volumes:
  mysql-data:
