spring:
  application:
    name: personalized-travel-system
  datasource:
    #  只有root用户才是dbc:mysql://localhost:3306,其他人填root的ip
    # 1. 改为真实 MySQL 的连接地址（替换 IP 和 数据库名称 travel_system）
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/travel_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    # 2. 改为你 MySQL 的账号
    username: ${MYSQL_USERNAME:}
    # 3. 改为你 MySQL 的密码
    password: ${MYSQL_PASSWORD:}
    # 4. 改为 MySQL 的驱动
    driver-class-name: ${MYSQL_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  elasticsearch:
    # 5. 改为你电脑的 IP
    uris: ${ES_URIS:http://192.168.64.128:9200}
    # 禁用 SSL 验证（本地开发环境）
    ssl:
      enabled: false
    # 如果需要用户名密码认证，取消下面的注释并配置
    # username: elastic
    # password: your-password
  data:
    elasticsearch:
      repositories:
        enabled: ${ES_REPOSITORIES_ENABLED:true}
  # ...下面的配置保持不变即可
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
server:
  port: ${SERVER_PORT:8080}

routing:
  graphhopper:
    enabled: ${GRAPHHOPPER_ENABLED:false}
    osm-file: ${GRAPHHOPPER_OSM_FILE:data/osm/china-latest.osm.pbf}
    graph-location: ${GRAPHHOPPER_GRAPH_LOCATION:data/graph-cache}
    profile: ${GRAPHHOPPER_PROFILE:car}
