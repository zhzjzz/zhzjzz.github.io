spring:
  application:
    name: personalized-travel-system
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/travel_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: ${MYSQL_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  elasticsearch:
    uris: ${ES_URIS:http://192.168.64.128:9200}
  data:
    elasticsearch:
      repositories:
        enabled: ${ES_REPOSITORIES_ENABLED:true}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
server:
  port: ${SERVER_PORT:8080}

routing:
  graphhopper:
    enabled: ${GRAPHHOPPER_ENABLED:true}
    osm-file: ${GRAPHHOPPER_OSM_FILE:data/osm/china-260415.osm.pbf}
    graph-location: ${GRAPHHOPPER_GRAPH_LOCATION:data/graph-cache}
