# =============================================================
# 通用配置 — 所有 profile 共享
# 默认激活 dev profile，团队成员开箱即用
# 切换到正式环境: 设置环境变量 SPRING_PROFILES_ACTIVE=prod
# =============================================================

spring:
  application:
    name: personalized-travel-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

server:
  port: ${SERVER_PORT:8080}
