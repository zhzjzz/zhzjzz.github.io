spring:
  application:
    name: personalized-travel-system
  datasource:
    url: ${MYSQL_URL:jdbc:h2:mem:travel_system;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${MYSQL_USERNAME:sa}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: ${MYSQL_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  data:
    elasticsearch:
      repositories:
        enabled: ${ES_REPOSITORIES_ENABLED:false}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
server:
  port: ${SERVER_PORT:8080}

routing:
  graphhopper:
    enabled: ${GRAPHHOPPER_ENABLED:false}
    osm-file: ${GRAPHHOPPER_OSM_FILE:data/osm/china-latest.osm.pbf}
    graph-location: ${GRAPHHOPPER_GRAPH_LOCATION:data/graph-cache}
