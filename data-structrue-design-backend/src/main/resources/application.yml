spring:
  application:
    name: personalized-travel-system
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/travel_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
mybatis:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: ${SERVER_PORT:8080}
