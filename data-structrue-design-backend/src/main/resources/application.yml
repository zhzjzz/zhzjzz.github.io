# =============================================================
#  通用配置 — 所有 profile 共享
# =============================================================
#
# 数据库切换: 改 profiles.active 那行即可
#
#   H2 (开发):   active: dev     → mvn spring-boot:run
#   MySQL:       active: prod    → mvn spring-boot:run
#
# IDEA 里切: Run Configuration → Active profiles → 填 dev 或 prod

spring:
  application:
    name: personalized-travel-system
  profiles:
#    active: ${SPRING_PROFILES_ACTIVE:dev}
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

server:
  port: ${SERVER_PORT:8080}
