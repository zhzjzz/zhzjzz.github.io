# 开发环境配置 (profile: dev)
# 团队成员零配置启动: mvn spring-boot:run

spring:
  datasource:
    url: jdbc:h2:file:./data/dev-db/travel_system;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
